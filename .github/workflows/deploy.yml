name: Build and Deploy to Azure Container Apps

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to Azure Container Registry
        run: |
          az acr login --name githubportfolioanalyzeracr

      - name: Build Docker image
        run: |
          docker build \
            -t githubportfolioanalyzeracr.azurecr.io/github-portfolio-analyzer:${{ github.sha }} \
            -t githubportfolioanalyzeracr.azurecr.io/github-portfolio-analyzer:latest \
            .

      - name: Push Docker images
        run: |
          docker push githubportfolioanalyzeracr.azurecr.io/github-portfolio-analyzer:${{ github.sha }}
          docker push githubportfolioanalyzeracr.azurecr.io/github-portfolio-analyzer:latest

      - name: Deploy Container App
        run: |
          az containerapp update \
            --name github-portfolio-analyzer \
            --resource-group github-portfolio-analyzer-rg \
            --image githubportfolioanalyzeracr.azurecr.io/github-portfolio-analyzer:${{ github.sha }}

      - name: Show deployed URL
        run: |
          az containerapp show \
            --name github-portfolio-analyzer \
            --resource-group github-portfolio-analyzer-rg \
            --query properties.configuration.ingress.fqdn \
            --output tsv